<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PlaqTraq" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0891b2" />
<title>PlaqTraq</title>

<link rel="apple-touch-icon" href="dental-hygiene-concept-with-blue-background.svg" />

<script>
const manifest = {
  name: "PlaqTraq",
  short_name: "PlaqTraq",
  description: "Smart oral hygiene tracking",
  start_url: "./index.html",
  display: "standalone",
  background_color: "#f0f4f8",
  theme_color: "#0891b2",
  icons: [
    { src: "dental-hygiene-concept-with-blue-background.svg", sizes: "180x180", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
const mLink = document.createElement("link");
mLink.rel = "manifest";
mLink.href = URL.createObjectURL(blob);
document.head.appendChild(mLink);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body, #root {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4f8;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* Fixed app shell — never changes width between tabs */
  .app {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    background: #fff;
    width: 100%;
  }

  /* Desktop: centered phone frame */
  @media (min-width: 431px) {
    body { display: flex; align-items: center; justify-content: center; }
    .app {
      position: relative;
      width: 390px;
      height: 844px;
      max-height: 95vh;
      border-radius: 40px;
      box-shadow: 0 25px 80px rgba(0,0,0,.12), 0 4px 20px rgba(0,0,0,.06);
      border: 1px solid #e2e8f0;
      overflow: hidden;
    }
  }

  .header {
    background: linear-gradient(135deg, #06b6d4, #2563eb);
    color: #fff;
    padding: calc(var(--safe-top) + 16px) 20px 20px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .avatar {
    width: 40px; height: 40px; border-radius: 14px;
    background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px;
    width: 100%;
  }
  .tab-content > * + * { margin-top: 14px; }

  .score-card { border-radius: 20px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 18px; }
  .score-card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .score-label { font-size: 12px; color: #64748b; }
  .score-number { font-size: 48px; font-weight: 700; color: #0f172a; margin-top: 4px; line-height: 1; }
  .score-change { font-size: 12px; font-weight: 600; color: #059669; }
  .score-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  .progress-bar { margin-top: 14px; height: 8px; width: 100%; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: #0f172a; transition: width .6s ease; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 15px; font-weight: 600; color: #0f172a; }
  .section-action { font-size: 13px; font-weight: 500; color: #2563eb; background: none; border: none; cursor: pointer; font-family: inherit; }

  .reminder-card {
    border-radius: 16px; border: 1px solid #e2e8f0; background: #fff; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .reminder-card + .reminder-card { margin-top: 8px; }
  .reminder-name { font-size: 14px; font-weight: 600; color: #0f172a; }
  .reminder-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .badge-on {
    border-radius: 999px; background: #d1fae5; padding: 4px 10px;
    font-size: 11px; font-weight: 700; color: #047857; flex-shrink: 0;
  }

  .chart-wrap { border-radius: 20px; background: #f8fafc; border: 1px solid #f1f5f9; padding: 16px; }
  .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; height: 90px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; min-width: 0; }
  .bar { width: 100%; max-width: 20px; border-radius: 999px; background: #3b82f6; transition: height .4s ease; }
  .bar-label { font-size: 10px; color: #94a3b8; }

  .zone-card { border-radius: 18px; border: 1px solid #e2e8f0; background: #fff; padding: 14px 16px; }
  .zone-card + .zone-card { margin-top: 8px; }
  .zone-row { display: flex; align-items: center; justify-content: space-between; }
  .zone-name { font-size: 14px; font-weight: 600; color: #0f172a; }
  .sev-high { font-size: 12px; font-weight: 700; color: #dc2626; }
  .sev-medium { font-size: 12px; font-weight: 700; color: #d97706; }
  .sev-low { font-size: 12px; font-weight: 700; color: #059669; }
  .zone-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; color: #94a3b8; }

  .export-btn {
    border-radius: 999px; background: #0f172a; color: #fff; border: none;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .export-btn:active { opacity: 0.7; }
  .summary-card { border-radius: 18px; border: 1px solid #e2e8f0; background: #fff; padding: 16px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .summary-row + .summary-row { border-top: 1px solid #f1f5f9; }
  .summary-label { font-size: 13px; color: #64748b; }
  .summary-value { font-size: 13px; font-weight: 600; color: #0f172a; }
  .breakdown-title { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 12px; }
  .bar-row { margin-top: 10px; }
  .bar-row-header { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .bar-track { height: 7px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
  .bar-fill-red { height: 100%; background: #f87171; border-radius: 999px; }
  .bar-fill-green { height: 100%; background: #34d399; border-radius: 999px; }
  .bar-fill-blue { height: 100%; background: #60a5fa; border-radius: 999px; }

  .dashed-card { border-radius: 18px; border: 2px dashed #cbd5e1; background: #f8fafc; padding: 16px; }
  .dashed-card p { font-size: 13px; color: #94a3b8; }

  .nav {
    border-top: 1px solid #e2e8f0;
    background: #fff;
    padding: 10px 0 calc(var(--safe-bottom) + 8px);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    width: 100%;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer; text-align: center;
    font-size: 11px; color: #94a3b8; font-family: inherit; font-weight: 500;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 16px; transition: color .15s ease; min-width: 60px;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn.active { color: #2563eb; font-weight: 600; }
  .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [activeTab, setActiveTab] = useState("home");

  const weeklyScore = 82;
  const plaqueTrend = [78, 80, 76, 84, 82, 85, 82];
  const dailyData = [
    { day: "Mon", score: 78 }, { day: "Tue", score: 80 }, { day: "Wed", score: 76 },
    { day: "Thu", score: 84 }, { day: "Fri", score: 82 }, { day: "Sat", score: 85 }, { day: "Sun", score: 82 },
  ];
  const focusZones = [
    { area: "Upper Right Molars", frequency: 3, trend: "+1", severity: "high" },
    { area: "Lower Left Incisors", frequency: 2, trend: "-1", severity: "medium" },
    { area: "Upper Front Teeth", frequency: 1, trend: "stable", severity: "low" },
  ];
  const dentistSummary = [
    { label: "Avg. weekly hygiene", value: "82 / 100" },
    { label: "Brushing consistency", value: "13 / 14 sessions" },
    { label: "Flossing consistency", value: "4 / 7 days" },
    { label: "Top risk zone", value: "Upper right molars" },
  ];
  const reminders = [
    { title: "Morning brush", time: "7:30 AM / 9:00 AM", detail: "Weekdays / Weekends" },
    { title: "Night brush", time: "9:00 PM", detail: "Every day" },
    { title: "Floss reminder", time: "8:55 PM", detail: "Every day" },
  ];

  const sevClass = (s) => s === "high" ? "sev-high" : s === "medium" ? "sev-medium" : "sev-low";

  return (
    <div className="app">
      <div className="header">
        <div className="header-row">
          <h1>PlaqTraq</h1>
          <div className="avatar">🦷</div>
        </div>
      </div>

      <div className="content">
        <div className="tab-content">
          {activeTab === "home" && (
            <>
              <div className="score-card">
                <div className="score-card-row">
                  <div>
                    <div className="score-label">This week's score</div>
                    <div className="score-number">{weeklyScore}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="score-change">+4 this week</div>
                    <div className="score-sub">Steady improvement</div>
                  </div>
                </div>
                <div className="progress-bar">
                  <div className="progress-fill" style={{width: weeklyScore + "%"}} />
                </div>
              </div>
              <div>
                <div className="section-header">
                  <div className="section-title">Reminders</div>
                </div>
                {reminders.map((r) => (
                  <div className="reminder-card" key={r.title}>
                    <div>
                      <div className="reminder-name">{r.title}</div>
                      <div className="reminder-meta">{r.time} · {r.detail}</div>
                    </div>
                    <div className="badge-on">On</div>
                  </div>
                ))}
              </div>
            </>
          )}

          {activeTab === "care" && (
            <>
              <div className="section-header">
                <div className="section-title">Care &amp; Insights</div>
              </div>
              <div className="chart-wrap">
                <div className="bar-chart">
                  {plaqueTrend.map((v, i) => (
                    <div className="bar-col" key={i}>
                      <div className="bar" style={{height: v * 0.85 + "px"}} />
                      <span className="bar-label">{dailyData[i].day}</span>
                    </div>
                  ))}
                </div>
              </div>
              {focusZones.map((z) => (
                <div className="zone-card" key={z.area}>
                  <div className="zone-row">
                    <div className="zone-name">{z.area}</div>
                    <span className={sevClass(z.severity)}>{z.severity}</span>
                  </div>
                  <div className="zone-meta">
                    <span>Missed {z.frequency} times this week</span>
                    <span>Trend: {z.trend}</span>
                  </div>
                </div>
              ))}
            </>
          )}

          {activeTab === "dentist" && (
            <>
              <div className="section-header">
                <div className="section-title">Dentist snapshot</div>
              </div>

              <div className="summary-card">
                {dentistSummary.map((item) => (
                  <div className="summary-row" key={item.label}>
                    <span className="summary-label">{item.label}</span>
                    <span className="summary-value">{item.value}</span>
                  </div>
                ))}
              </div>

              <div className="summary-card">
                <div className="breakdown-title">Scoring breakdown</div>
                <div className="bar-row">
                  <div className="bar-row-header"><span>Plaque coverage</span><span>18%</span></div>
                  <div className="bar-track"><div className="bar-fill-red" style={{width:"18%"}} /></div>
                </div>
                <div className="bar-row">
                  <div className="bar-row-header"><span>Brushing completeness</span><span>82%</span></div>
                  <div className="bar-track"><div className="bar-fill-green" style={{width:"82%"}} /></div>
                </div>
                <div className="bar-row">
                  <div className="bar-row-header"><span>Coverage consistency</span><span>76%</span></div>
                  <div className="bar-track"><div className="bar-fill-blue" style={{width:"76%"}} /></div>
                </div>
              </div>

              <div className="summary-card">
                <div className="breakdown-title">High-risk areas</div>
                {focusZones.filter(z => z.severity !== "low").map((z) => (
                  <div className="summary-row" key={z.area}>
                    <span className="summary-label">{z.area}</span>
                    <span className="summary-value">{z.frequency} misses</span>
                  </div>
                ))}
              </div>

              <div className="summary-card">
                <div className="breakdown-title">Trend (last 7 days)</div>
                <div className="bar-chart" style={{height:"60px"}}>
                  {plaqueTrend.map((v, i) => (
                    <div className="bar-col" key={i}>
                      <div className="bar" style={{height: v * 0.55 + "px"}} />
                    </div>
                  ))}
                </div>
              </div>

            </>
          )}
        </div>
      </div>

      <div className="nav">
        <button className={"nav-btn" + (activeTab === "home" ? " active" : "")} onClick={() => setActiveTab("home")}>
          <span className="nav-icon">🏠</span>Home
        </button>
        <button className={"nav-btn" + (activeTab === "care" ? " active" : "")} onClick={() => setActiveTab("care")}>
          <span className="nav-icon">🩺</span>Care
        </button>
        <button className={"nav-btn" + (activeTab === "dentist" ? " active" : "")} onClick={() => setActiveTab("dentist")}>
          <span className="nav-icon">📋</span>Dentist
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
