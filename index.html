<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f0f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 0;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  /* On desktop, keep the phone shell. On mobile standalone, go full screen */
  .phone-shell {
    width: 100%;
    max-width: 390px;
    border-radius: 40px;
    background: #fff;
    box-shadow: 0 25px 80px rgba(0,0,0,.12), 0 4px 20px rgba(0,0,0,.06);
    overflow: hidden;
    border: 1px solid #e2e8f0;
    display: flex;
    flex-direction: column;
    max-height: 100vh;
    max-height: 100dvh;
  }

  @media (max-width: 430px) {
    body { padding: 0; align-items: stretch; }
    .phone-shell {
      max-width: 100%;
      border-radius: 0;
      box-shadow: none;
      border: none;
      min-height: 100vh;
      min-height: 100dvh;
    }
  }

  /* Standalone PWA mode */
  @media all and (display-mode: standalone) {
    body { padding: 0; align-items: stretch; }
    .phone-shell {
      max-width: 100%;
      border-radius: 0;
      box-shadow: none;
      border: none;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .header { padding-top: calc(var(--safe-top) + 16px) !important; }
    .nav { padding-bottom: calc(var(--safe-bottom) + 10px) !important; }
  }

  .header {
    background: linear-gradient(135deg, #06b6d4, #2563eb);
    color: #fff;
    padding: 28px 24px 22px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 26px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .avatar {
    width: 44px; height: 44px; border-radius: 16px;
    background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .content {
    padding: 20px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .content > * + * { margin-top: 16px; }

  /* Score Card */
  .score-card {
    border-radius: 24px; background: #f8fafc; border: 1px solid #e2e8f0; padding: 22px;
  }
  .score-card-row { display: flex; align-items: flex-start; justify-content: space-between; }
  .score-label { font-size: 13px; color: #64748b; }
  .score-number { font-size: 52px; font-weight: 700; color: #0f172a; margin-top: 6px; line-height: 1; }
  .score-change { font-size: 13px; font-weight: 600; color: #059669; }
  .score-sub { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .progress-bar { margin-top: 18px; height: 10px; width: 100%; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: #0f172a; transition: width .6s ease; }

  /* Reminder Cards */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 15px; font-weight: 600; color: #0f172a; }
  .section-action { font-size: 13px; font-weight: 500; color: #2563eb; background: none; border: none; cursor: pointer; font-family: inherit; }
  .reminder-card {
    border-radius: 18px; border: 1px solid #e2e8f0; background: #fff; padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .reminder-card + .reminder-card { margin-top: 10px; }
  .reminder-name { font-size: 14px; font-weight: 600; color: #0f172a; }
  .reminder-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .badge-on {
    border-radius: 999px; background: #d1fae5; padding: 4px 12px;
    font-size: 11px; font-weight: 700; color: #047857; flex-shrink: 0;
  }

  /* Chart */
  .chart-wrap {
    border-radius: 24px; background: #f8fafc; border: 1px solid #f1f5f9; padding: 18px;
  }
  .bar-chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; height: 90px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px; }
  .bar {
    width: 100%; max-width: 16px; border-radius: 999px; background: #3b82f6;
    transition: height .4s ease;
  }
  .bar-label { font-size: 10px; color: #94a3b8; }

  /* Focus zone cards */
  .zone-card {
    border-radius: 22px; border: 1px solid #e2e8f0; background: #fff; padding: 16px;
  }
  .zone-card + .zone-card { margin-top: 10px; }
  .zone-row { display: flex; align-items: center; justify-content: space-between; }
  .zone-name { font-size: 14px; font-weight: 600; color: #0f172a; }
  .sev-high { font-size: 12px; font-weight: 700; color: #dc2626; }
  .sev-medium { font-size: 12px; font-weight: 700; color: #d97706; }
  .sev-low { font-size: 12px; font-weight: 700; color: #059669; }
  .zone-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: #94a3b8; }

  /* Dentist tab */
  .export-btn {
    border-radius: 999px; background: #0f172a; color: #fff; border: none;
    padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .export-btn:active { opacity: 0.7; }
  .summary-card {
    border-radius: 22px; border: 1px solid #e2e8f0; background: #fff; padding: 18px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .summary-row + .summary-row { border-top: 1px solid #f1f5f9; }
  .summary-label { font-size: 13px; color: #64748b; }
  .summary-value { font-size: 13px; font-weight: 600; color: #0f172a; }

  .breakdown-title { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 14px; }
  .bar-row { margin-top: 12px; }
  .bar-row-header { display: flex; justify-content: space-between; font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .bar-track { height: 7px; background: #f1f5f9; border-radius: 999px; overflow: hidden; }
  .bar-fill-red { height: 100%; background: #f87171; border-radius: 999px; }
  .bar-fill-green { height: 100%; background: #34d399; border-radius: 999px; }
  .bar-fill-blue { height: 100%; background: #60a5fa; border-radius: 999px; }

  .img-row { display: flex; gap: 10px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .img-placeholder {
    min-width: 76px; height: 76px; border-radius: 14px; background: #e2e8f0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #94a3b8; flex-shrink: 0;
  }
  .img-caption { font-size: 11px; color: #94a3b8; margin-top: 8px; }

  .dashed-card {
    border-radius: 22px; border: 2px dashed #cbd5e1; background: #f8fafc; padding: 18px;
  }
  .dashed-card p { font-size: 13px; color: #94a3b8; }

  /* Nav */
  .nav {
    border-top: 1px solid #e2e8f0; background: #fff; padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-around;
    flex-shrink: 0;
  }
  .nav-btn {
    background: none; border: none; cursor: pointer; text-align: center;
    font-size: 11px; color: #94a3b8; font-family: inherit; font-weight: 500;
    -webkit-tap-highlight-color: transparent;
    padding: 4px 12px;
    transition: color .15s ease;
  }
  .nav-btn:active { transform: scale(0.95); }
  .nav-btn.active { color: #2563eb; font-weight: 600; }
  .nav-icon { font-size: 20px; display: block; margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function App() {
  const [activeTab, setActiveTab] = useState("home");

  const weeklyScore = 82;
  const plaqueTrend = [78, 80, 76, 84, 82, 85, 82];
  const dailyData = [
    { day: "Mon", score: 78 }, { day: "Tue", score: 80 }, { day: "Wed", score: 76 },
    { day: "Thu", score: 84 }, { day: "Fri", score: 82 }, { day: "Sat", score: 85 }, { day: "Sun", score: 82 },
  ];
  const focusZones = [
    { area: "Upper Right Molars", frequency: 3, trend: "+1", severity: "high" },
    { area: "Lower Left Incisors", frequency: 2, trend: "-1", severity: "medium" },
    { area: "Upper Front Teeth", frequency: 1, trend: "stable", severity: "low" },
  ];
  const dentistSummary = [
    { label: "Avg. weekly hygiene", value: "82 / 100" },
    { label: "Brushing consistency", value: "13 / 14 sessions" },
    { label: "Flossing consistency", value: "4 / 7 days" },
    { label: "Top risk zone", value: "Upper right molars" },
  ];
  const reminders = [
    { title: "Morning brush", time: "7:30 AM / 9:00 AM", detail: "Weekdays / Weekends" },
    { title: "Night brush", time: "9:00 PM", detail: "Every day" },
    { title: "Floss reminder", time: "8:55 PM", detail: "Every day" },
  ];

  const sevClass = (s) => s === "high" ? "sev-high" : s === "medium" ? "sev-medium" : "sev-low";

  return (
    <div className="phone-shell">
      <div className="header">
        <div className="header-row">
          <div>
            <h1>PlaqTraq</h1>
          </div>
          <div className="avatar">🦷</div>
        </div>
      </div>

      <div className="content">
        {activeTab === "home" && (
          <>
            <div className="score-card">
              <div className="score-card-row">
                <div>
                  <div className="score-label">This week's score</div>
                  <div className="score-number">{weeklyScore}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div className="score-change">+4 this week</div>
                  <div className="score-sub">Steady improvement</div>
                </div>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{width: weeklyScore + "%"}} />
              </div>
            </div>

            <div>
              <div className="section-header">
                <div className="section-title">Reminders</div>
                <button className="section-action">Edit</button>
              </div>
              {reminders.map((r) => (
                <div className="reminder-card" key={r.title}>
                  <div>
                    <div className="reminder-name">{r.title}</div>
                    <div className="reminder-meta">{r.time} · {r.detail}</div>
                  </div>
                  <div className="badge-on">On</div>
                </div>
              ))}
            </div>
          </>
        )}

        {activeTab === "care" && (
          <>
            <div className="section-header">
              <div className="section-title">Care &amp; Insights</div>
              <button className="section-action">Edit</button>
            </div>
            <div className="chart-wrap">
              <div className="bar-chart">
                {plaqueTrend.map((v, i) => (
                  <div className="bar-col" key={i}>
                    <div className="bar" style={{height: v * 0.85 + "px"}} />
                    <span className="bar-label">{dailyData[i].day}</span>
                  </div>
                ))}
              </div>
            </div>
            {focusZones.map((z) => (
              <div className="zone-card" key={z.area}>
                <div className="zone-row">
                  <div className="zone-name">{z.area}</div>
                  <span className={sevClass(z.severity)}>{z.severity}</span>
                </div>
                <div className="zone-meta">
                  <span>Missed {z.frequency} times this week</span>
                  <span>Trend: {z.trend}</span>
                </div>
              </div>
            ))}
          </>
        )}

        {activeTab === "dentist" && (
          <>
            <div className="section-header">
              <div className="section-title">Dentist snapshot</div>
              <button className="export-btn">Export PDF</button>
            </div>

            <div className="summary-card">
              {dentistSummary.map((item) => (
                <div className="summary-row" key={item.label}>
                  <span className="summary-label">{item.label}</span>
                  <span className="summary-value">{item.value}</span>
                </div>
              ))}
            </div>

            <div className="summary-card">
              <div className="breakdown-title">Scoring breakdown</div>
              <div className="bar-row">
                <div className="bar-row-header"><span>Plaque coverage</span><span>18%</span></div>
                <div className="bar-track"><div className="bar-fill-red" style={{width:"18%"}} /></div>
              </div>
              <div className="bar-row">
                <div className="bar-row-header"><span>Brushing completeness</span><span>82%</span></div>
                <div className="bar-track"><div className="bar-fill-green" style={{width:"82%"}} /></div>
              </div>
              <div className="bar-row">
                <div className="bar-row-header"><span>Coverage consistency</span><span>76%</span></div>
                <div className="bar-track"><div className="bar-fill-blue" style={{width:"76%"}} /></div>
              </div>
            </div>

            <div className="summary-card">
              <div className="breakdown-title">Image evidence (worst frames)</div>
              <div className="img-row">
                {[1,2,3].map((i) => (
                  <div className="img-placeholder" key={i}>Img {i}</div>
                ))}
              </div>
              <div className="img-caption">Frames with highest detected plaque concentration</div>
            </div>

            <div className="summary-card">
              <div className="breakdown-title">High-risk areas</div>
              {focusZones.filter(z => z.severity !== "low").map((z) => (
                <div className="summary-row" key={z.area}>
                  <span className="summary-label">{z.area}</span>
                  <span className="summary-value">{z.frequency} misses</span>
                </div>
              ))}
            </div>

            <div className="summary-card">
              <div className="breakdown-title">Trend (last 7 days)</div>
              <div className="bar-chart" style={{height:"60px"}}>
                {plaqueTrend.map((v, i) => (
                  <div className="bar-col" key={i}>
                    <div className="bar" style={{height: v * 0.55 + "px"}} />
                  </div>
                ))}
              </div>
            </div>

            <div className="dashed-card">
              <p>Dentist notes (to be filled during visit)</p>
            </div>
          </>
        )}
      </div>

      <div className="nav">
        <button className={"nav-btn" + (activeTab === "home" ? " active" : "")} onClick={() => setActiveTab("home")}>
          <span className="nav-icon">🏠</span>Home
        </button>
        <button className={"nav-btn" + (activeTab === "care" ? " active" : "")} onClick={() => setActiveTab("care")}>
          <span className="nav-icon">🩺</span>Care
        </button>
        <button className={"nav-btn" + (activeTab === "dentist" ? " active" : "")} onClick={() => setActiveTab("dentist")}>
          <span className="nav-icon">📋</span>Dentist
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
